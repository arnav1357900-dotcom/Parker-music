<!DOCTYPE html><html>
<head>
  <title>Zeno Music</title>
  <style>
    body { background:black; color:white; font-family:Arial; padding:10px; }
    .song { background:#222; padding:10px; margin:10px 0; border-radius:10px; }
    input { width:100%; padding:10px; margin-bottom:10px; }
    button { padding:8px; background:red; color:white; border:none; border-radius:5px; }
    iframe { width:100%; height:200px; margin-top:10px; border-radius:10px; }
  </style>
</head>
<body><h2>Zeno Music 🎧</h2><input id="search" placeholder="Search songs..." />
<button onclick="searchSongs()">Search</button><div id="results"></div><script>
const API_KEY = "PASTE_YOUR_KEY_HERE";

async function searchSongs() {
  let query = document.getElementById("search").value;

  let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=10&q=${query}&key=${API_KEY}`;
  
  let res = await fetch(url);
  let data = await res.json();

  let container = document.getElementById("results");
  container.innerHTML = "";

  data.items.forEach(item => {
    let videoId = item.id.videoId;

    let div = document.createElement("div");
    div.className = "song";
    div.innerHTML = `
      <p>${item.snippet.title}</p>
      <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
    `;

    container.appendChild(div);
  });
}
</script></body>
</html>
